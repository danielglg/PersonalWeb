  <script>
    // Single Page Apps for GitHub Pages – decode redirect
    // https://github.com/rafgraph/spa-github-pages
    // Converts /?/cv back to /cv before Angular bootstraps.
    (function(l) {
      if (l.search[1] === '/') {
        var decoded = l.search.slice(1).split('&').map(function(s) {
          return s.replace(/~and~/g, '&');
        });
        window.history.replaceState(
          null, null,
          l.pathname.slice(0, -1) + decoded[0] +
          (decoded.slice(1).length ? '?' + decoded.slice(1).join('&') : '') +
          l.hash
        );
      }
    }(window.location));
  </script>
