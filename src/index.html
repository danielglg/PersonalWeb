<!doctype html>
<html lang="en">
<head>
  <!-- Title and more meta tags on app.component.ts -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Daniel Gómez-Lobo García - Professional Website</title>

  <base href="/">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Playfair+Display+SC">

  <script>
    // Single Page Apps for GitHub Pages – decode redirect
    // https://github.com/rafgraph/spa-github-pages
    // Converts /?/cv back to /cv before Angular bootstraps.
    (function(l) {
      if (l.search[1] === '/') {
        var decoded = l.search.slice(1).split('&').map(function(s) {
          return s.replace(/~and~/g, '&');
        });
        window.history.replaceState(
          null, null,
          l.pathname.slice(0, -1) + decoded[0] +
          (decoded.slice(1).length ? '?' + decoded.slice(1).join('&') : '') +
          l.hash
        );
      }
    }(window.location));
  </script>

</head>
<body>
  <app-root></app-root>
</body>
</html>
