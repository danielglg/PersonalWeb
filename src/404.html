<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Daniel Gómez-Lobo García - Professional Website</title>
  <script>
    // Single Page Apps for GitHub Pages – redirect trick
    // https://github.com/rafgraph/spa-github-pages
    //
    // pathSegmentsToKeep = 1 because the app is deployed under a sub-path
    // (/PersonalWeb/). Set to 0 for a custom root domain.
    var pathSegmentsToKeep = 1;

    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
